services:
  docsee:
    build: .
    container_name: docsee
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCSEE_PASSWORD=${DOCSEE_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - PORT=${PORT:-3001}
